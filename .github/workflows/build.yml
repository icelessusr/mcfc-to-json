name: Build

on:
  push:
    tags:
      - 'v*'
  pull_request:

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        run: |
          wget -q https://download.qt.io/official_releases/qt/6.7/6.7.0/single/qt-everywhere-opensource-src-6.7.0.tar.xz -O qt.tar.xz || true
          if [ -f qt.tar.xz ]; then
            echo "Qt archive found"
          else
            echo "Using apt"
            sudo apt-get update
            sudo apt-get install -y qt6-base-dev qt6-multimedia-dev
          fi

      - name: Install Qt viaaqt
        run: |
          pip install aqtinstall
          aqt install-qt linux desktop 6.7.0 gcc_64 -O /opt/Qt

      - name: Build
        run: |
          export PATH=/opt/Qt/6.7.0/gcc_64/bin:$PATH
          mkdir -p build && cd build
          /opt/Qt/6.7.0/gcc_64/bin/qmake ../mcfc-to-json.pro
          make -j$(nproc)

      - name: Package tar.gz
        run: |
          cd build
          tar -czvf mcfc-to-json-linux-x86_64.tar.gz mcfc-to-json

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: build/mcfc-to-json-linux-x86_64.tar.gz

  build-macos-x86_64:
    runs-on: macos-12
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        run: |
          pip install aqtinstall
          aqt install-qt mac desktop 6.7.0 clang_64 -O /opt/Qt

      - name: Build
        run: |
          export PATH=/opt/Qt/6.7.0/clang_64/bin:$PATH
          mkdir -p build && cd build
          /opt/Qt/6.7.0/clang_64/bin/qmake ../mcfc-to-json.pro
          make -j$(nproc)

      - name: Package dmg
        run: |
          cd build
          hdiutil create -volname mcfc-to-json -srcfolder mcfc-to-json.app -ov -format UDZO mcfc-to-json-x86_64.dmg

      - name: Package tar.gz
        run: |
          cd build
          tar -czvf mcfc-to-json-macos-x86_64.tar.gz mcfc-to-json.app

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: |
            build/mcfc-to-json-x86_64.dmg
            build/mcfc-to-json-macos-x86_64.tar.gz

  build-macos-aarch64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        run: |
          pip install aqtinstall
          aqt install-qt mac desktop 6.7.0 clang_64 -O /opt/Qt

      - name: Build
        run: |
          export PATH=/opt/Qt/6.7.0/clang_64/bin:$PATH
          mkdir -p build && cd build
          /opt/Qt/6.7.0/clang_64/bin/qmake ../mcfc-to-json.pro
          make -j$(nproc)

      - name: Package dmg
        run: |
          cd build
          hdiutil create -volname mcfc-to-json -srcfolder mcfc-to-json.app -ov -format UDZO mcfc-to-json-aarch64.dmg

      - name: Package tar.gz
        run: |
          cd build
          tar -czvf mcfc-to-json-macos-aarch64.tar.gz mcfc-to-json.app

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: |
            build/mcfc-to-json-aarch64.dmg
            build/mcfc-to-json-macos-aarch64.tar.gz

  build-windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 6.7.0 mingw_64 -O C:\Qt

      - name: Build
        run: |
          $env:PATH = "C:\Qt\6.7.0\mingw_64\bin;$env:PATH"
          mkdir build
          cd build
          C:\Qt\6.7.0\mingw_64\bin\qmake ..\mcfc-to-json.pro
          mingw32-make -j$env:NUMBER_OF_PROCESSORS

      - name: Package zip
        run: |
          cd build
          powershell -Command "Compress-Archive -Path mcfc-to-json.exe -DestinationPath mcfc-to-json-windows-x86_64.zip -Force"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: build/mcfc-to-json-windows-x86_64.zip

  release:
    needs: [build-linux-x86_64, build-macos-x86_64, build-macos-aarch64, build-windows-x86_64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
